; =============================================================================
; ESP32-BC-250 — Controlador Inteligente para Fonte ATX BC-250
; =============================================================================
; Combina controle físico (botão), Web, Alexa e Gamepad Bluetooth.
;
; IMPORTANTE:
; - Bluepad32 requer framework Arduino customizado (BTstack ao invés de Bluedroid)
; - Partição huge_app.csv: 3MB app, ~1MB SPIFFS, SEM suporte a OTA
; - Após alterar partições: PIO > Clean > Build > Upload
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; --- Partição grande (3MB app) para caber WiFi + BT + WebServer + Alexa ------
board_build.partitions = huge_app.csv

; --- Framework customizado Bluepad32 (substitui stack BT padrão) -------------
; Ref: https://github.com/ricardoquesada/bluepad32
platform_packages =
    framework-arduinoespressif32 @ https://github.com/maxgerhardt/pio-framework-bluepad32/archive/refs/heads/main.zip

; --- Bibliotecas -------------------------------------------------------------
lib_deps =
    ; WiFiManager - Portal cativo para configuração Wi-Fi
    tzapu/WiFiManager @ ^2.0.17
    ; ESPAsyncWebServer - Servidor HTTP assíncrono (versão compatível ESP32Async)
    ESP32Async/ESPAsyncWebServer @ ^3.9.6
    ; FauxmoESP - Emulação de dispositivo Philips Hue para Alexa
    vintlabs/FauxmoESP @ ^3.4.1
    ; Bluepad32 - Já incluído no framework customizado, registrado aqui para LDF
    Bluepad32_ESP32

; --- Build Flags -------------------------------------------------------------
build_flags =
    -D CORE_DEBUG_LEVEL=3          ; INFO level para debug durante dev
    -D FAUXMO_DEVICE_NAME="\"BC\""
    -D WIFI_AP_NAME="\"ESP32-BC250-Setup\""
    -D FW_VERSION="\"1.0.0\""
    -D DEBUG_FAUXMO=Serial
    -D DEBUG_FAUXMO_VERBOSE_TCP=true
    -D DEBUG_FAUXMO_VERBOSE_UDP=true

; --- Monitor Serial ----------------------------------------------------------
monitor_speed = 115200
monitor_filters = esp32_exception_decoder